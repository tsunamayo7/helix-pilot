<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1b26;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .terminal {
    background: #0d0f17;
    border-radius: 12px;
    width: 780px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
    font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .titlebar {
    background: #1a1d2e;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }
  .title {
    color: #8b949e;
    font-size: 12px;
    margin-left: 8px;
    flex: 1;
    text-align: center;
  }
  .content {
    padding: 20px 24px 24px;
    color: #c9d1d9;
    overflow: hidden;
  }
  .line {
    opacity: 0;
    animation: fadeIn 0.3s forwards;
    white-space: pre-wrap;
    margin-bottom: 2px;
  }
  .prompt { color: #7ee787; }
  .cmd { color: #79c0ff; }
  .tool { color: #d2a8ff; font-weight: bold; }
  .key { color: #8b949e; }
  .val { color: #ffa657; }
  .str { color: #a5d6ff; }
  .bool { color: #7ee787; }
  .num { color: #ffa657; }
  .comment { color: #8b949e; font-style: italic; }
  .ok { color: #3fb950; font-weight: bold; }
  .section { color: #58a6ff; font-weight: bold; margin-top: 8px; }
  .dim { color: #484f58; }
  .separator { border-top: 1px solid #21262d; margin: 10px 0; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: #7ee787;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="terminal">
  <div class="titlebar">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
    <div class="title">helix-pilot MCP Tools Demo</div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const lines = [
  // Step 1: status
  { html: '<span class="section">Step 1: Check system status</span>', delay: 500 },
  { html: '<span class="prompt">$</span> <span class="cmd">mcp call</span> <span class="tool">status()</span>', delay: 800 },
  { html: '', delay: 200 },
  { html: '  <span class="key">"ok"</span>: <span class="bool">true</span>', delay: 100 },
  { html: '  <span class="key">"helix_pilot_version"</span>: <span class="str">"1.0.0"</span>', delay: 100 },
  { html: '  <span class="key">"ollama"</span>: <span class="bool">available</span> <span class="dim">(localhost:11434)</span>', delay: 100 },
  { html: '  <span class="key">"vision_model"</span>: <span class="str">"mistral-small3.2:latest"</span>', delay: 100 },
  { html: '  <span class="key">"screen_size"</span>: <span class="num">[3840, 2160]</span> <span class="dim">(4K)</span>', delay: 100 },
  { html: '  <span class="key">"safe_mode"</span>: <span class="bool">true</span>', delay: 100 },
  { html: '  <span class="ok">System ready.</span>', delay: 600 },

  // Separator
  { html: '<div class="separator"></div>', delay: 300 },

  // Step 2: screenshot
  { html: '<span class="section">Step 2: Capture screenshot</span>', delay: 500 },
  { html: '<span class="prompt">$</span> <span class="cmd">mcp call</span> <span class="tool">screenshot</span>(<span class="key">window</span>=<span class="str">"Notepad"</span>)', delay: 800 },
  { html: '', delay: 200 },
  { html: '  <span class="key">"ok"</span>: <span class="bool">true</span>', delay: 100 },
  { html: '  <span class="key">"size"</span>: <span class="num">[1280, 720]</span>', delay: 100 },
  { html: '  <span class="key">"path"</span>: <span class="str">"data/screenshots/notepad_001.png"</span>', delay: 100 },
  { html: '  <span class="ok">Screenshot saved.</span>', delay: 600 },

  // Separator
  { html: '<div class="separator"></div>', delay: 300 },

  // Step 3: describe
  { html: '<span class="section">Step 3: Analyze with Vision LLM</span>', delay: 500 },
  { html: '<span class="prompt">$</span> <span class="cmd">mcp call</span> <span class="tool">describe</span>(<span class="key">window</span>=<span class="str">"Notepad"</span>)', delay: 800 },
  { html: '  <span class="dim">Sending to Ollama mistral-small3.2...</span>', delay: 1200 },
  { html: '', delay: 200 },
  { html: '  <span class="key">"description"</span>:', delay: 100 },
  { html: '  <span class="str">"A Notepad window with an empty text area.</span>', delay: 150 },
  { html: '  <span class="str"> Title bar shows \'Untitled - Notepad\'.</span>', delay: 150 },
  { html: '  <span class="str"> Menu bar: File, Edit, View, Help."</span>', delay: 100 },
  { html: '  <span class="ok">Analysis complete (2.1s)</span>', delay: 600 },

  // Separator
  { html: '<div class="separator"></div>', delay: 300 },

  // Step 4: auto
  { html: '<span class="section">Step 4: Autonomous execution</span>', delay: 500 },
  { html: '<span class="prompt">$</span> <span class="cmd">mcp call</span> <span class="tool">auto</span>(<span class="key">instruction</span>=<span class="str">"Type \'Hello from helix-pilot!\'"</span>, <span class="key">window</span>=<span class="str">"Notepad"</span>)', delay: 800 },
  { html: '', delay: 200 },
  { html: '  <span class="dim">Planning actions...</span>', delay: 800 },
  { html: '  <span class="comment">  1. click_element: "text area"</span>', delay: 400 },
  { html: '  <span class="comment">  2. type_text: "Hello from helix-pilot!"</span>', delay: 400 },
  { html: '  <span class="comment">  3. verify: "text appears in editor"</span>', delay: 400 },
  { html: '', delay: 200 },
  { html: '  <span class="dim">Executing step 1/3...</span> <span class="ok">done</span>', delay: 600 },
  { html: '  <span class="dim">Executing step 2/3...</span> <span class="ok">done</span>', delay: 600 },
  { html: '  <span class="dim">Executing step 3/3...</span> <span class="ok">verified</span>', delay: 600 },
  { html: '', delay: 200 },
  { html: '  <span class="key">"steps_executed"</span>: <span class="num">3</span>', delay: 100 },
  { html: '  <span class="key">"steps_succeeded"</span>: <span class="num">3</span>', delay: 100 },
  { html: '  <span class="ok">Task completed successfully.</span>', delay: 500 },

  // Final
  { html: '', delay: 300 },
  { html: '<span class="prompt">$</span> <span class="cursor"></span>', delay: 0 },
];

async function animate() {
  const content = document.getElementById('content');
  for (const line of lines) {
    await new Promise(r => setTimeout(r, line.delay));
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = line.html;
    div.style.animationDelay = '0s';
    content.appendChild(div);
    content.scrollTop = content.scrollHeight;
  }
}

animate();
</script>
</body>
</html>
