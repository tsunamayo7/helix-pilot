name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Syntax check
        run: |
          uv run python -m py_compile server.py
          uv run python -m py_compile main.py
          uv run python -m py_compile src/pilot/__init__.py

      - name: Run tests
        run: uv run python -m pytest tests/ -v --timeout=30 --ignore=tests/test_server.py --ignore=tests/test_lock_manager.py

      - name: Run server import test
        run: uv run python -c "from server import mcp; assert mcp.name == 'helix-pilot'; print('Server OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Ruff check
        run: uvx ruff check src/ server.py tests/ --ignore E501,E402
